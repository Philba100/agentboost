<!DOCTYPE html>
<html lang="en"><body><script>
    var ai_edge_gallery_get_result = async function(data) {
        try {
            const jsonObj = JSON.parse(data);
            const params = new URLSearchParams({
                url: jsonObj.target_url || 'example.com'
            });

            return JSON.stringify({
                webview: {
                    url: `https://agentboost-seven.vercel.app/seo-audit?${params.toString()}`
                }
            });
        } catch (error) {
            return JSON.stringify({
                webview: { url: `https://agentboost-seven.vercel.app/seo-audit?error=true` }
            });
        }
    };
    window.ai_edge_gallery_get_result = ai_edge_gallery_get_result;
</script></body></html>
